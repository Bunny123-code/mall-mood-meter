<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>How Was Your Visit?</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:   #4f46e5;
      --primary-light: #eef2ff;
      --happy:     #16a34a;
      --neutral:   #d97706;
      --unhappy:   #dc2626;
      --bg:        #f8fafc;
      --card:      #ffffff;
      --text:      #1e293b;
      --muted:     #64748b;
      --border:    #e2e8f0;
      --radius:    16px;
      --shadow:    0 4px 24px rgba(0,0,0,.08);
    }

    body {
      min-height: 100dvh;
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 16px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 420px;
      padding: 36px 28px 32px;
      text-align: center;
    }

    .mall-logo {
      width: 56px;
      height: 56px;
      background: var(--primary-light);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 28px;
    }

    .store-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 6px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 28px;
    }

    .mood-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .mood-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 18px 8px;
      border: 2.5px solid var(--border);
      border-radius: 14px;
      background: #fff;
      cursor: pointer;
      transition: all .18s ease;
    }

    .mood-btn:hover  { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,.1); }
    .mood-btn:active { transform: scale(.96); }

    .mood-btn .emoji { font-size: 42px; line-height: 1; }
    .mood-btn .label { font-size: 12px; font-weight: 600; color: var(--muted); }

    .mood-btn.selected-happy    { border-color: var(--happy);   background: #f0fdf4; }
    .mood-btn.selected-neutral  { border-color: var(--neutral); background: #fffbeb; }
    .mood-btn.selected-unhappy  { border-color: var(--unhappy); background: #fef2f2; }

    .mood-btn.selected-happy    .label { color: var(--happy); }
    .mood-btn.selected-neutral  .label { color: var(--neutral); }
    .mood-btn.selected-unhappy  .label { color: var(--unhappy); }

    .comment-wrap { margin-bottom: 22px; text-align: left; }
    .comment-wrap label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 7px;
    }
    .comment-wrap textarea {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 11px 13px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      height: 80px;
      outline: none;
    }
    .comment-wrap textarea:focus { border-color: var(--primary); }

    .submit-btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: var(--primary);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background .18s;
    }
    .submit-btn:hover:not(:disabled)  { background: #4338ca; }
    .submit-btn:disabled { opacity: .55; cursor: not-allowed; }

    .error-msg {
      display: none;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 10px;
      padding: 11px 14px;
      color: var(--unhappy);
      font-size: 13px;
      margin-bottom: 16px;
    }

    .thankyou {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 12px 0 4px;
    }
    .thankyou .big-emoji { font-size: 64px; animation: pop .4s ease; }
    .thankyou h2 { font-size: 22px; font-weight: 700; }
    .thankyou p  { font-size: 14px; color: var(--muted); }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 99px;
      margin-top: 16px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--primary);
      width: 0%;
      animation: shrink 4s linear forwards;
    }

    @keyframes pop {
      0%   { transform: scale(.5); opacity: 0; }
      70%  { transform: scale(1.15); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes shrink {
      from { width: 100%; }
      to   { width: 0%; }
    }

    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="card" id="root-card">
  <!-- Form view -->
  <div id="form-view">
    <div class="mall-logo">🏪</div>
    <div class="store-name" id="store-label">Loading store…</div>
    <h1>How was your experience?</h1>
    <p class="subtitle">Tap an emoji to share your mood – it only takes a second!</p>

    <div class="mood-grid">
      <button class="mood-btn" id="btn-happy" data-mood="happy">
        <span class="emoji">😊</span>
        <span class="label">Happy</span>
      </button>
      <button class="mood-btn" id="btn-neutral" data-mood="neutral">
        <span class="emoji">😐</span>
        <span class="label">Neutral</span>
      </button>
      <button class="mood-btn" id="btn-unhappy" data-mood="unhappy">
        <span class="emoji">😠</span>
        <span class="label">Unhappy</span>
      </button>
    </div>

    <div class="comment-wrap">
      <label for="comment">Any comment? <span style="font-weight:400;">(optional)</span></label>
      <textarea id="comment" placeholder="Tell us more…" maxlength="300"></textarea>
    </div>

    <div class="error-msg" id="error-msg"></div>
    <button class="submit-btn" id="submit-btn" disabled>Submit Feedback</button>
  </div>

  <!-- Thank you view -->
  <div id="thankyou-view" class="thankyou">
    <div class="big-emoji" id="ty-emoji">😊</div>
    <h2>Thank you!</h2>
    <p>Your feedback helps us improve your experience.</p>
    <div class="progress-bar"><div class="progress-bar-fill" id="progress-fill"></div></div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getFirestore, collection, addDoc, serverTimestamp, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyA9kH3rpz8Zaf40lXd_SGhiKlkk2oiMCVo",
    authDomain: "mall-mood-meter.firebaseapp.com",
    projectId: "mall-mood-meter",
    storageBucket: "mall-mood-meter.firebasestorage.app",
    messagingSenderId: "261002684409",
    appId: "1:261002684409:web:4b2151b76f38b76b333f28",
    measurementId: "G-J9L41YFQML"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Get storeId from URL
  const urlParams = new URLSearchParams(window.location.search);
  const storeId = urlParams.get('store')?.trim();

  let selectedMood = null;
  let storeName = storeId || 'Store';

  // DOM elements
  const storeLabel = document.getElementById('store-label');
  const btnHappy = document.getElementById('btn-happy');
  const btnNeutral = document.getElementById('btn-neutral');
  const btnUnhappy = document.getElementById('btn-unhappy');
  const commentEl = document.getElementById('comment');
  const submitBtn = document.getElementById('submit-btn');
  const errorMsgDiv = document.getElementById('error-msg');
  const formView = document.getElementById('form-view');
  const thankyouView = document.getElementById('thankyou-view');
  const tyEmoji = document.getElementById('ty-emoji');

  // Helper: show error
  function showError(msg) {
    errorMsgDiv.textContent = msg;
    errorMsgDiv.style.display = 'block';
    setTimeout(() => { errorMsgDiv.style.display = 'none'; }, 4000);
  }

  // Helper: hide error
  function hideError() {
    errorMsgDiv.style.display = 'none';
  }

  // Mood selection
  function selectMood(mood) {
    selectedMood = mood;
    // Update UI
    const moodMap = { happy: btnHappy, neutral: btnNeutral, unhappy: btnUnhappy };
    Object.entries(moodMap).forEach(([m, btn]) => {
      if (btn) {
        if (m === mood) {
          btn.classList.add(`selected-${m}`);
        } else {
          btn.classList.remove(`selected-happy`, `selected-neutral`, `selected-unhappy`);
        }
      }
    });
    submitBtn.disabled = false;
    hideError();
  }

  // Attach event listeners to mood buttons
  btnHappy.addEventListener('click', () => selectMood('happy'));
  btnNeutral.addEventListener('click', () => selectMood('neutral'));
  btnUnhappy.addEventListener('click', () => selectMood('unhappy'));

  // Submit feedback
  async function submitFeedback() {
    if (!selectedMood) {
      showError('Please select a mood first.');
      return;
    }

    const comment = commentEl.value.trim();

    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner"></span>Submitting…';

    try {
      await addDoc(collection(db, 'moods'), {
        storeId: storeId,
        mood: selectedMood,
        comment: comment || null,
        timestamp: serverTimestamp(),
        sessionId: Math.random().toString(36).slice(2) + Date.now().toString(36)
      });

      // Show thank you
      const emojiMap = { happy: '😊', neutral: '😐', unhappy: '😠' };
      tyEmoji.textContent = emojiMap[selectedMood] || '😊';
      formView.style.display = 'none';
      thankyouView.style.display = 'flex';

      // Reset progress bar animation
      const fill = document.getElementById('progress-fill');
      fill.style.animation = 'none';
      fill.offsetHeight; // force reflow
      fill.style.animation = '';

      // Reset form after 4 seconds
      setTimeout(() => {
        selectedMood = null;
        commentEl.value = '';
        submitBtn.disabled = true;
        submitBtn.innerHTML = 'Submit Feedback';
        // Reset mood button styles
        [btnHappy, btnNeutral, btnUnhappy].forEach(btn => {
          btn.classList.remove('selected-happy', 'selected-neutral', 'selected-unhappy');
        });
        formView.style.display = 'block';
        thankyouView.style.display = 'none';
      }, 4000);
    } catch (err) {
      console.error('Submit error:', err);
      showError('Something went wrong. Please try again.');
      submitBtn.disabled = false;
      submitBtn.innerHTML = 'Submit Feedback';
    }
  }

  submitBtn.addEventListener('click', submitFeedback);

  // Load store name from Firestore
  async function loadStoreName() {
    if (!storeId) {
      storeLabel.textContent = 'Invalid Store';
      return;
    }

    // Show store ID immediately while loading
    storeLabel.textContent = storeId;

    try {
      const storeRef = doc(db, 'stores', storeId);
      const storeSnap = await getDoc(storeRef);
      if (storeSnap.exists()) {
        const data = storeSnap.data();
        storeName = data.storeName || storeId;
        storeLabel.textContent = storeName;
      } else {
        storeLabel.textContent = storeId;
      }
    } catch (err) {
      console.error('Error loading store:', err);
      storeLabel.textContent = storeId;
    }
  }

  // Initialize
  if (!storeId) {
    storeLabel.textContent = 'Missing Store ID';
    submitBtn.disabled = true;
  } else {
    loadStoreName();
  }
</script>
</body>
</html>
